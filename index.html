<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Restaurant Istanbul - Menu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Police style oriental -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #1b0003;
      --bg2: #2b0407;
      --card-bg: #2f0508;
      --accent: #ffb62a;
      --accent-soft: #ff6a3c;
      --text: #fdf5f2;
      --muted: #c9a9a2;
      --border: rgba(255,255,255,0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #3b0509 0, #1b0003 55%, #100002 100%);
      color: var(--text);
      line-height: 1.5;
      padding: 16px;
      min-height: 300vh;
      overflow-y: auto;
    }

    .container {
      max-width: 950px;
      margin: 0 auto 48px;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
      position: relative;
    }

    /* Barre dorée décorative sous le titre principal */
    .header::after {
      content: "";
      display: block;
      width: 140px;
      height: 2px;
      margin: 12px auto 0;
      background: linear-gradient(90deg, transparent, #ffb62a, transparent);
    }

    .logo img {
      max-width: 180px;
      height: auto;
      border-radius: 999px;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      margin-bottom: 6px;
      color: var(--muted);
    }

    h1 {
      font-family: "El Messiri", system-ui, sans-serif;
      font-size: 30px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 4px;
      color: var(--accent);
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 10px;
    }

    .info {
      font-size: 13px;
      color: var(--muted);
    }

    .highlight {
      color: var(--accent);
      font-weight: 600;
    }

    .schedule-row {
      font-size: 12px;
    }

    nav {
      margin: 18px 0 4px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
    }
